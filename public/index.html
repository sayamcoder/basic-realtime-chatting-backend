<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Chat Dashboard</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Socket.io Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Hide scrollbar utility */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">

  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden flex flex-col min-h-[600px] max-h-[700px]">
    
    <!-- Header Section -->
    <header class="bg-slate-900 text-white p-5 flex items-center justify-between border-b border-slate-800">
      <div>
        <h1 class="text-xl font-bold tracking-tight">ChatSync</h1>
        <p class="text-xs text-slate-400 mt-0.5">Real-Time Messaging</p>
      </div>
      <!-- Connection Heartbeat -->
      <div class="flex items-center space-x-2 bg-slate-800 px-3 py-1.5 rounded-full">
        <span id="status-dot" class="h-2.5 w-2.5 rounded-full bg-rose-500 animate-pulse"></span>
        <span id="connection-status" class="text-xs font-semibold text-slate-300">Offline</span>
      </div>
    </header>

    <!-- Content Area -->
    <main class="flex-1 p-6 overflow-y-auto flex flex-col justify-between">

      <!-- 1. Authentication Card -->
      <div id="auth-section" class="space-y-6 my-auto">
        <div class="text-center">
          <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Get Started</h2>
          <p class="text-sm text-slate-500 mt-1">Register a new account or log in to continue</p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Username (Only for Register)</label>
            <input type="text" id="username" placeholder="sayam_coder" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-sm">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 pt-2">
          <button onclick="register()" class="w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition text-sm">Register</button>
          <button onclick="login()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-100 text-sm">Log In</button>
        </div>
      </div>

      <!-- 2. Dashboard Section (Create / Join Rooms) -->
      <div id="room-section" class="space-y-6 hidden my-auto">
        <!-- User Info Panel -->
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
          <div class="flex justify-between items-center">
            <span class="text-xs font-semibold text-slate-500 uppercase">Logged in as</span>
            <span id="user-display" class="text-sm font-bold text-slate-800"></span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-xs font-semibold text-slate-500 uppercase">Your User ID</span>
            <div class="flex items-center space-x-2">
              <span id="user-id-display" class="text-xs font-mono font-bold text-slate-600 bg-white border px-2 py-1 rounded select-all max-w-[150px] truncate"></span>
              <button onclick="copyUserId()" class="text-blue-600 hover:text-blue-800 text-xs font-bold transition">Copy</button>
            </div>
          </div>
        </div>

        <hr class="border-slate-100">

        <!-- Create Room Tab -->
        <div class="space-y-3">
          <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Create a New Chat Room</h3>
          <p class="text-xs text-slate-500">Paste your partner's User ID to link your sockets.</p>
          <div class="flex space-x-2">
            <input type="text" id="partner-id" placeholder="Partner's User ID" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
            <button onclick="createRoom()" class="px-5 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl transition text-xs">Create Room</button>
          </div>
          <p id="created-room-id" class="text-xs text-blue-600 font-bold break-all"></p>
        </div>

        <hr class="border-slate-100">

        <!-- Join Room Tab -->
        <div class="space-y-3">
          <h3 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Start Chatting</h3>
          <p class="text-xs text-slate-500">Enter the Room ID created above to begin real-time messaging.</p>
          <input type="text" id="conversationId" placeholder="Paste Room ID Here" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm mb-2">
          <button onclick="joinChat()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-100 text-sm">Enter Chat Room</button>
        </div>
      </div>

      <!-- 3. Active Chat Window -->
      <div id="chat-section" class="flex-1 flex flex-col justify-between hidden h-full">
        <div class="flex items-center justify-between pb-3 border-b border-slate-100 mb-4">
          <button onclick="backToRooms()" class="text-xs font-semibold text-slate-500 hover:text-slate-800 flex items-center space-x-1.5 transition">
            <span>&larr;</span> <span>Rooms</span>
          </button>
          <span class="text-xs font-bold text-slate-400 font-mono tracking-wider">Room Active</span>
        </div>

        <!-- Scrollable Messages Window -->
        <div id="messages-box" class="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-1 min-h-[350px] max-h-[350px] mb-4">
          <!-- Messages will dynamically render inside this container -->
        </div>

        <!-- Chat Input Bar -->
        <div class="flex items-center space-x-2 border-t border-slate-100 pt-4">
          <input type="text" id="message-text" onkeypress="handleKeyPress(event)" placeholder="Type a message..." class="flex-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm">
          <button onclick="sendMessage()" class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition shadow-lg shadow-blue-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <script>
    let socket;
    let token = "";
    let userId = "";
    let activeConversationId = "";

    // Register User
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        alert(data.message || data.error);
      } catch (err) {
        console.error(err);
      }
    }

    // Login User
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          token = data.token;
          userId = data.userId;
          document.getElementById('user-display').innerText = data.username;
          document.getElementById('user-id-display').innerText = data.userId;
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('room-section').classList.remove('hidden');
          connectSocket();
        } else {
          alert(data.message || 'Login failed');
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Connect to WebSocket Server with JWT credentials
    function connectSocket() {
      socket = io(window.location.origin, {
        auth: { token: token }
      });

      socket.on('connect', () => {
        const statusEl = document.getElementById('connection-status');
        const statusDot = document.getElementById('status-dot');
        statusEl.innerText = 'Connected';
        statusEl.className = 'text-xs font-semibold text-emerald-400';
        statusDot.className = 'h-2.5 w-2.5 rounded-full bg-emerald-400 animate-pulse';
      });

      socket.on('disconnect', () => {
        const statusEl = document.getElementById('connection-status');
        const statusDot = document.getElementById('status-dot');
        statusEl.innerText = 'Offline';
        statusEl.className = 'text-xs font-semibold text-slate-300';
        statusDot.className = 'h-2.5 w-2.5 rounded-full bg-rose-500 animate-pulse';
      });

      // Listen for incoming messages
      socket.on('new_message', (message) => {
        if (message.conversationId === activeConversationId) {
          displayMessage(message);
          // Auto-emit read receipt
          socket.emit('message_read', { messageId: message._id });
        }
      });

      socket.on('error', (err) => {
        alert(err.message || 'WebSocket Error');
      });
    }

    // Copy User ID utility
    function copyUserId() {
      const idStr = document.getElementById('user-id-display').innerText;
      navigator.clipboard.writeText(idStr);
      alert('Your User ID has been copied to clipboard!');
    }

    // Create Room Hook
    async function createRoom() {
      const partnerId = document.getElementById('partner-id').value;
      if (!partnerId) return alert('Please input the Partner\'s User ID first');

      try {
        const res = await fetch('/api/chat/conversations', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            participants: [userId, partnerId],
            isGroup: false
          })
        });
        const data = await res.json();
        if (res.ok) {
          document.getElementById('created-room-id').innerText = `Room Created Successfully!\nRoom ID: ${data._id}`;
          document.getElementById('conversationId').value = data._id;
        } else {
          alert('Failed to establish room connection');
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Swap Views
    function joinChat() {
      const convId = document.getElementById('conversationId').value;
      if (!convId) return alert('Room ID is required to start chatting');

      activeConversationId = convId;
      document.getElementById('room-section').classList.add('hidden');
      document.getElementById('chat-section').classList.remove('hidden');
      document.getElementById('messages-box').innerHTML = ""; // Clean board

      // -> ADD THIS LINE (Server ko batayein ke hum room join kar rahe hain)
      socket.emit('join_room', { conversationId: convId });
    }

    function backToRooms() {
      document.getElementById('chat-section').classList.add('hidden');
      document.getElementById('room-section').classList.remove('hidden');
    }

    // Send Message Event
    function sendMessage() {
      const text = document.getElementById('message-text').value;
      if (!text.trim()) return;

      socket.emit('send_message', {
        conversationId: activeConversationId,
        text: text
      });

      document.getElementById('message-text').value = ""; // Reset box
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Display Message Bubbles Dynamically
    function displayMessage(msg) {
      const box = document.getElementById('messages-box');
      const isMe = msg.sender._id === userId || msg.sender === userId;
      
      const msgContainer = document.createElement('div');
      msgContainer.className = `flex w-full mb-2 ${isMe ? 'justify-end' : 'justify-start'}`;
      
      const senderName = msg.sender.username || (isMe ? 'You' : 'Partner');
      
      msgContainer.innerHTML = `
        <div class="max-w-[75%] ${isMe ? 'bg-blue-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-slate-100 text-slate-800 rounded-r-2xl rounded-tl-2xl'} px-4 py-2.5 shadow-sm">
          <p class="text-[10px] font-bold ${isMe ? 'text-blue-200' : 'text-slate-400'} mb-1">${senderName}</p>
          <p class="text-sm break-words">${msg.text}</p>
        </div>
      `;
      box.appendChild(msgContainer);
      box.scrollTop = box.scrollHeight; // Auto scroll container down
    }
  </script>
</body>
</html>
